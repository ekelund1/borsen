<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Aktiekurser</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }

    /* Centered, oversized loading banner */
    #loading-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      background-color: rgba(255, 255, 255, 0.98);
      z-index: 1000;
      text-align: center;
      padding: 80px 20px;
      border: 5px solid #333;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    }
    .spinner {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #3498db;
      border-radius: 50%;
      width: 150px;
      height: 150px;
      animation: spin 1s linear infinite;
      margin: 0 auto 40px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #reloadButton {
      width: 100vw;
      height: 100px;
      font-size: 36px;
      background-color: lightblue;
      cursor: pointer;
      border: none;
      display: block;
    }
    
    .table-row:nth-child(even) td {
      background-color: #f2f2f2;
    }
    .positive { color: green; }
    .negative { color: red; }
    .zero { color: black; }
    
    table {
      font-size: 40px;
      font-weight: bolder;
      width: 100%;
      border-spacing: 0 3rem;
      border-collapse: separate;
    }
    th, td {
      border-bottom: 5px solid black;
      padding: 10px;
      text-align: right;
      min-width: 20px;
    }
    .name-cell {
      width: 100%;
      word-wrap: break-word;
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- Loading Indicator -->
  <div id="loading-container">
    <div class="spinner"></div>
    <p style="font-size: 60px; font-weight: bold; margin: 0;">Laddar, vänligen vänta</p>
  </div>

  <button id="reloadButton">Uppdatera</button>

  <div id="error-container" style="display: none; text-align: center; margin-top: 50px;">
    <p style="font-size: 50px; color: red; font-weight: bold; margin: 0;">Gick inte att ladda.</p>
    <p style="font-size: 40px; margin: 10px 0;">Det är inte ditt fel. Ring Jonathan om det inte löst sig inom 2 timmar.</p>
    <p id="error-details" style="font-size: 20px; color: gray; margin-top: 30px;"></p>
  </div>

  <div id="content" style="display: none;">
    <table></table>
  </div>

  <script>
    const table = document.querySelector("table");
    const errorContainer = document.getElementById("error-container");
    const errorDetails = document.getElementById("error-details");
    const contentContainer = document.getElementById("content");
    const loadingContainer = document.getElementById("loading-container");

    fetch("https://europe-north1-stable-balancer-421510.cloudfunctions.net/get-data", { cache: "no-store" })
      .then(async (response) => {
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(`Status ${response.status}: ${errorData.message || 'Okänt fel'}`);
        }
        return response.json();
      })
      .then((data) => {
        if (!Array.isArray(data)) {
          throw new Error("Data från servern är inte en lista.");
        }

        const headerRow = document.createElement("tr");["Företag", "%", "Kurs"].forEach((text, i) => {
          const th = document.createElement("th");
          th.textContent = text;
          if (i == 0) th.className = "name-cell";
          headerRow.appendChild(th);
        });
        table.appendChild(headerRow);

        data.forEach((item) => {
          const row = document.createElement("tr");
          row.className = "table-row";

          const nameCell = document.createElement("td");
          nameCell.className = "name-cell";
          nameCell.textContent = item.name.replaceAll("ser.", "");
          row.appendChild(nameCell);

          const percentageCell = document.createElement("td");
          percentageCell.textContent = item.percent;
          if (item.percent < 0) {
            percentageCell.className = "negative";
          } else if (item.percent === 0) {
            percentageCell.className = "zero";
          } else {
            percentageCell.className = "positive";
            percentageCell.textContent = "+" + item.percent;
          }
          row.appendChild(percentageCell);

          const valueCell = document.createElement("td");
          valueCell.textContent = item.value;
          row.appendChild(valueCell);

          table.appendChild(row);
        });

        loadingContainer.style.display = "none";
        contentContainer.style.display = "block";
      })
      .catch((error) => {
        loadingContainer.style.display = "none";
        contentContainer.style.display = "none";
        errorContainer.style.display = "block";
        errorDetails.textContent = `Teknisk info: ${error.message}`;
        console.error("Fetch failed:", error);
      });

      const reloadButton = document.getElementById('reloadButton');
      reloadButton.addEventListener('click', () => {
        const timestamp = Date.now();
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('timestamp', timestamp);
        location.replace(currentUrl.toString());
      });
  </script>
</body>
</html>
